name: "ml-experiment-debugger"
version: "1.0.0"
description: "A real-world environment where an AI agent acts as an ML Engineer to debug and optimize broken training experiments."
author: "Antigravity"
tags:
  - machine-learning
  - debugging
  - software-engineering
  - technical-reasoning

environment:
  type: structured
  max_steps: 10
  entry_point: "decision_env.env:create_env"

tasks:
  - id: "easy_lr_issue"
    name: "Sub-optimal Learning Rate"
    difficulty: "easy"
    description: "The experiment fails to converge due to an extremely low learning rate."
  
  - id: "medium_vanishing_gradient"
    name: "Deep Network Vanishing Gradients"
    difficulty: "medium"
    description: "A deep MLP is missing normalization, causing gradients to vanish and training to stall."

  - id: "hard_data_leakage"
    name: "Validation Split Data Leakage"
    difficulty: "hard"
    description: "Identify and fix a case where validation set contamination causes suspiciously perfect metrics that don't generalize."

observation_space:
  description: "Training config, time-series metrics (loss/accuracy), and simulated console logs."

action_space:
  description: "Config overrides (dictionary) and training control (run N epochs)."
