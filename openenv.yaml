name: "ml-debug-env"
version: "1.0.1"
description: "High-fidelity ML Experiment Debugging Simulator for AI Agents."
author: "Antigravity"
tags: ["ml", "debugging"]

environment:
  type: structured
  max_steps: 10
  entry_point: "decision_env.env:create_env"

tasks:
  - id: easy_lr_issue
    name: "Task 1: Learning Rate Convergence"
    difficulty: "easy"
    grader: "decision_env.grader:MLDebugGrader"
  
  - id: medium_vanishing_gradient
    name: "Task 2: Vanishing Gradients"
    difficulty: "medium"
    grader: "decision_env.grader:MLDebugGrader"

  - id: hard_data_leakage
    name: "Task 3: Data Split Leakage"
    difficulty: "hard"
    grader: "decision_env.grader:MLDebugGrader"

  - id: bonus_complexity_test
    name: "Task 4: Extreme Optimization"
    difficulty: "hard"
    grader: "decision_env.grader:MLDebugGrader"

observation_space:
  description: "Training config, metrics, and logs."

action_space:
  description: "Config overrides and run commands."
